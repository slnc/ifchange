name: ifchange

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ifchange:
    uses: YOUR_ORG/ifchange/.github/workflows/ifchange-reusable.yml@v1
    with:
      binary_source: prebuilt
      release_repository: YOUR_ORG/ifchange
      binary_version: v1.2.3
      base_ref: ${{ github.base_ref }}
      diff_from: ${{ github.event.before }}
      diff_to: ${{ github.sha }}
      lint_args: ""
