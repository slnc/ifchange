name: IfChange

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ifchange:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build ifchange
        run: cargo install --path .

      - uses: ./
